name = "astro-lmneg-inmobiliarios"
compatibility_date = "2026-04-29"
compatibility_flags = [ "nodejs_compat" ]

[assets]
directory = "./dist"

# Tras el primer deploy, si falta el KV, crear con:
#   npx wrangler kv namespace create SESSION
# y pegar el id abajo (preview: npx wrangler kv namespace create SESSION --preview).
[[kv_namespaces]]
binding = "SESSION"
id = "c167d2137d65426db48162039d5afcce"

[vars]
# URL pública del back (túnel cloudflared → localhost:3020). Cambia al reiniciar el túnel.
PUBLIC_API_URL = "https://REEMPLAZAR-CON-TUNNEL.trycloudflare.com"
PUBLIC_WHATSAPP_NUMBER = "5493434647737"

# URL del deploy: https://astro-lmneg-inmobiliarios.gabrielsantostefano.workers.dev
